services:
  - type: web
    name: musicbot-backend
    buildCommand: "./gradlew clean build"
    startCommand: "java -jar build/libs/musicbot-0.0.1-SNAPSHOT.jar"
    envVars:
      - key: JAVA_VERSION
        value: "17"

  - type: web
    name: musicbot-frontend
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "npx serve -s frontend/dist"